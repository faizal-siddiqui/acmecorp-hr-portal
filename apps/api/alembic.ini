# Alembic configuration — salary-management API
# Run from apps/api/:  uv run alembic <command>

[alembic]
script_location = alembic

# sqlalchemy.url is intentionally left blank; env.py reads it from
# app.config.settings so DATABASE_URL is the single source of truth.
sqlalchemy.url =

# File format for new migration scripts
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated timestamps in migration file names
timezone = UTC

# Maximum length of migration script slug
truncate_slug_length = 40

prepend_sys_path = .

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
