services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-salary}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-salary_management}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: ${API_IMAGE:-ghcr.io/faizal-siddiqui/acmecorp-hr-portal-api:main}
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-salary}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-salary_management}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
